{% extends "base.html" %}

{% block content %}

<h2>✏️ Editar Usuario</h2>

<form method="POST">

    <label>Nombre:</label><br>
    <input type="text" name="nombre" value="{{ usuario.nombre }}" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="mail" value="{{ usuario.mail }}" required><br><br>

    <label>Contraseña:</label><br>
    <input type="text" name="password" value="{{ usuario.password }}" required><br><br>

    <button type="submit">Actualizar</button>

</form>

<br>

<a href="/usuarios">
    <button>⬅️ Volver</button>
</a>

{% endblock %}
