<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Punto de la Suerte - Sistema</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        header {
            background: linear-gradient(90deg, #2c3e50, #34495e);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .navbar {
            background: #2c3e50 !important;
        }

        .navbar a {
            color: white !important;
            font-weight: bold;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #2980b9;
            border: none;
        }

        .btn-success {
            background: #27ae60;
            border: none;
        }

        .btn-danger {
            background: #e74c3c;
            border: none;
        }

        table {
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>

<body>

<header>
    💰 Punto de la Suerte - Sistema de Facturación
</header>

<nav class="navbar navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="/">Inicio</a>

        {% if current_user.is_authenticated %}
            <a class="nav-link" href="/inventario">Inventario</a>
            <a class="nav-link" href="/agregar_producto">Agregar</a>
            <a class="nav-link" href="/usuarios">Usuarios</a>
            <a class="nav-link" href="/reporte_pdf">📄 Reporte PDF</a>
            <a href="/facturar">🧾 Facturar</a>
            <a href="/facturas">📄 Facturas</a>

            <span class="text-white ms-3">👋 {{ current_user.nombre }}</span>

            <a href="/logout" class="btn btn-danger ms-3">Cerrar sesión</a>
        {% else %}
            <a class="nav-link" href="/login">Login</a>
            <a class="nav-link" href="/registro">Registro</a>
        {% endif %}

    </div>
</nav>

<div class="container mt-4">
    <div class="card p-4">
        {% block content %}
        {% endblock %}
    </div>
</div>

</body>
</html>
