{% extends "base.html" %}

{% block content %}

<h2>Inventario</h2>

<form method="GET">
<input type="text" name="buscar" placeholder="Buscar producto">
<button type="submit">Buscar</button>
</form>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Acciones</th>
</tr>

{% for producto in productos %}

<tr>

<td>{{ producto[0] }}</td>
<td>{{ producto[1] }}</td>
<td>{{ producto[2] }}</td>
<td>{{ producto[3] }}</td>

<td>
<a href="/editar_producto/{{ producto[0] }}">Editar</a> |
<a href="/eliminar_producto/{{ producto[0] }}">Eliminar</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
