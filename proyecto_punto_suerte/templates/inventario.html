{% extends "base.html" %}

{% block content %}

<h2>Inventario</h2>

<form method="GET">
<input type="text" name="buscar" placeholder="Buscar producto">
<button type="submit">Buscar</button>
</form>

<table>

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Acciones</th>
</tr>

{% for producto in productos %}

<tr>

<td>{{ producto.id }}</td>
<td>{{ producto.nombre }}</td>
<td>{{ producto.cantidad }}</td>
<td>${{ producto.precio }}</td>

<td>
<a href="/editar_producto/{{ producto.id }}">Editar</a> |
<a href="/eliminar_producto/{{ producto.id }}">Eliminar</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
