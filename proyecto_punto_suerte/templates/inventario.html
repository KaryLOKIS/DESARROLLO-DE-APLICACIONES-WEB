{% extends "base.html" %}

{% block content %}

<h2>📦 Inventario de Productos</h2>

<div style="margin-bottom:15px;">
    <form method="GET">
        <input type="text" name="buscar" placeholder="🔍 Buscar producto">
        <button type="submit">Buscar</button>
    </form>
</div>

<a href="/agregar_producto" class="btn">
    ➕ Agregar Producto
</a>

<br><br>

<table>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Acciones</th>
    </tr>

    {% for producto in productos %}
    <tr>
        <td>{{ producto.id }}</td>
        <td>{{ producto.nombre }}</td>
        <td>{{ producto.cantidad }}</td>
        <td>$ {{ producto.precio }}</td>

        <td>
            <a href="/editar_producto/{{ producto.id }}" class="btn">
                ✏️ Editar
            </a>

            <a href="/eliminar_producto/{{ producto.id }}" class="btn btn-danger">
                🗑️ Eliminar
            </a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
