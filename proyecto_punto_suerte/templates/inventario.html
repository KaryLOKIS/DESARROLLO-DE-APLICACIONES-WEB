{% extends "base.html" %}

{% block content %}

<h3>📦 Gestión de Inventario</h3>

<form method="GET" class="d-flex mb-3">
    <input type="text" name="buscar" class="form-control me-2" placeholder="Buscar producto...">
    <button class="btn btn-primary">Buscar</button>
</form>

<a href="/agregar_producto" class="btn btn-success mb-3">➕ Nuevo Producto</a>
<a href="/reporte_pdf" class="btn btn-secondary mb-3">📄 Generar PDF</a>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>Nombre</th>
            <th>Cantidad</th>
            <th>Precio</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.nombre }}</td>
            <td>{{ p.cantidad }}</td>
            <td>${{ p.precio }}</td>
            <td>
                <a href="/editar_producto/{{ p.id }}" class="btn btn-primary btn-sm">Editar</a>
                <a href="/eliminar_producto/{{ p.id }}" class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar producto?')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
