{% extends "base.html" %}

{% block contenido %}

<div class="card p-4">

    <h2 class="text-center mb-4 fw-bold">🎰 Sistema de Lotería</h2>

    <!-- FORM -->
    <form method="POST" class="row g-3 mb-4">

        <div class="col-md-4">
            <label class="form-label">Cliente</label>
            <select name="cliente" class="form-select">
                {% for c in clientes %}
                <option value="{{ c.id_usuario }}">{{ c.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-3">
            <label class="form-label">Número</label>
            <input type="number" name="numero" class="form-control" min="0" max="99">
        </div>

        <div class="col-md-3">
            <label class="form-label">Valor</label>
            <input type="number" name="valor" class="form-control">
        </div>

        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-success w-100">🎟 Vender</button>
        </div>

    </form>

    <!-- BOTONES -->
    <div class="d-flex justify-content-between mb-3">
        <h5>📊 Historial</h5>
        <a href="/sortear" class="btn btn-danger">🎲 Sortear</a>
    </div>

    <!-- TABLA -->
    <div class="table-responsive">
        <table class="table table-hover text-center">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Número</th>
                    <th>Valor</th>
                    <th>Fecha</th>
                </tr>
            </thead>

            <tbody>
                {% for j in jugadas %}
                <tr>
                    <td>{{ j.id_boleto }}</td>
                    <td>{{ j.nombre }}</td>
                    <td><span class="badge bg-primary">{{ j.numero }}</span></td>
                    <td class="text-success">${{ j.valor }}</td>
                    <td>{{ j.fecha }}</td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

</div>

{% endblock %}
