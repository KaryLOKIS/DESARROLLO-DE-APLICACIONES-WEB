<!DOCTYPE html>
<html>
<head>
    <title>Factura</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            padding: 40px;
        }

        .factura {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 700px;
            margin: auto;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .total {
            text-align: right;
            margin-top: 20px;
            font-size: 22px;
        }
    </style>
</head>

<body>

<div class="factura">

    <h2>🧾 Factura #{{ datos[0].id_factura }}</h2>

    <p><b>Cliente:</b> {{ datos[0].cliente }}</p>
    <p><b>Fecha:</b> {{ datos[0].fecha }}</p>

    <table>
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio</th>
        </tr>

        {% for d in datos %}
        <tr>
            <td>{{ d.producto }}</td>
            <td>{{ d.cantidad }}</td>
            <td>${{ d.precio }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="total">
        <b>Total: ${{ datos[0].total }}</b>
    </div>

</div>

</body>
</html>
