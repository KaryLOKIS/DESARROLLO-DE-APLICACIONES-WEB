{% extends "base.html" %}

{% block contenido %}

<div class="card p-4">

    <h3 class="mb-4">🧾 Generar Factura</h3>

    <form method="POST">

        <!-- CLIENTE -->
        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select name="cliente" class="form-select" required>
                {% for c in clientes %}
                <option value="{{ c.id_usuario }}">{{ c.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- PRODUCTO -->
        <div class="mb-3">
            <label class="form-label">Producto</label>
            <select name="producto" id="producto" class="form-select" onchange="mostrarPrecio()" required>
                {% for p in productos %}
                <option value="{{ p.id }}" data-precio="{{ p.precio }}">
                    {{ p.nombre }} - ${{ p.precio }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- PRECIO -->
        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="text" id="precio" class="form-control" readonly>
        </div>

        <!-- CANTIDAD -->
        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" name="cantidad" id="cantidad" class="form-control" onkeyup="calcularTotal()" required>
        </div>

        <!-- TOTAL -->
        <div class="mb-3">
            <label class="form-label">Total</label>
            <input type="text" id="total" class="form-control" readonly>
        </div>

        <button class="btn btn-success">💾 Facturar</button>

    </form>

</div>

<!-- SCRIPT -->
<script>
function mostrarPrecio() {
    let select = document.getElementById("producto");
    let precio = select.options[select.selectedIndex].getAttribute("data-precio");
    document.getElementById("precio").value = precio;
    calcularTotal();
}

function calcularTotal() {
    let precio = document.getElementById("precio").value;
    let cantidad = document.getElementById("cantidad").value;

    let total = precio * cantidad;
    document.getElementById("total").value = total || 0;
}

// cargar precio al iniciar
window.onload = mostrarPrecio;
</script>

{% endblock %}
