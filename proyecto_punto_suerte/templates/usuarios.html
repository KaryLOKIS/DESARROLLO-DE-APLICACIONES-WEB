{% extends "base.html" %}

{% block contenido %}

<div class="card p-4">

    <h3>👥 Usuarios</h3>

    <table class="table table-bordered text-center">

        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.id_usuario }}</td>
                <td>{{ u.nombre }}</td>
                <td>{{ u.email }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
