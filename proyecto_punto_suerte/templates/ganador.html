{% extends "base.html" %}

{% block contenido %}

<div class="card p-5 text-center">

    <h2>🎉 Número Ganador</h2>
    <h1 style="font-size:60px; color:red;">{{ numero }}</h1>

    {% if ganador %}
        <h3>Ganador: {{ ganador.nombre }}</h3>
    {% else %}
        <h3>No hubo ganador </h3>
    {% endif %}

    <a href="/loteria" class="btn btn-primary mt-3">Volver</a>

</div>

{% endblock %}
